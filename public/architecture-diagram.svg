<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AasaMedChem architecture and quotation flow</title>
  <desc id="desc">Diagram showing admin inventory management, seller catalog and quotation submission, server-side unit conversion, and database persistence.</desc>
  <rect width="1200" height="760" rx="28" fill="#F8FAFC"/>
  <rect x="32" y="32" width="1136" height="696" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>

  <text x="72" y="88" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">AasaMedChem Core Flow</text>
  <text x="72" y="122" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="17">Role-based inventory, unit conversion, quotation submission, and admin review</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect x="72" y="168" width="230" height="142" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="104" y="210" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Admin</text>
  <text x="104" y="242" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Creates products</text>
  <text x="104" y="266" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Sets stock and base unit</text>
  <text x="104" y="290" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Controls active visibility</text>

  <rect x="72" y="456" width="230" height="142" rx="16" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="104" y="498" fill="#065F46" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Seller</text>
  <text x="104" y="530" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Browses active catalog</text>
  <text x="104" y="554" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Chooses quantity and unit</text>
  <text x="104" y="578" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Submits quotation cart</text>

  <rect x="430" y="152" width="300" height="174" rx="16" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="462" y="194" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Product Model</text>
  <text x="462" y="228" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">products</text>
  <text x="462" y="252" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">units</text>
  <text x="462" y="276" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">product_available_units</text>
  <text x="462" y="300" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">price and stock as NUMERIC(30,12)</text>

  <rect x="430" y="426" width="300" height="204" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="462" y="468" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Quotation API</text>
  <text x="462" y="502" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Validates seller session</text>
  <text x="462" y="526" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Fetches trusted price and unit data</text>
  <text x="462" y="550" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Recalculates every line</text>
  <text x="462" y="574" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Rejects invalid units and over-stock</text>
  <text x="462" y="598" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">Saves quote with conversion snapshot</text>

  <rect x="846" y="160" width="250" height="154" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="878" y="202" fill="#5B21B6" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Unit Engine</text>
  <text x="878" y="236" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">kg and g to g</text>
  <text x="878" y="260" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">L and mL to mL</text>
  <text x="878" y="284" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">unit and pcs to unit</text>

  <rect x="846" y="426" width="250" height="204" rx="16" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="2"/>
  <text x="878" y="468" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Admin Review</text>
  <text x="878" y="502" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">quotation number</text>
  <text x="878" y="526" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">seller identity</text>
  <text x="878" y="550" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">ordered quantity and unit</text>
  <text x="878" y="574" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">base quantity and unit</text>
  <text x="878" y="598" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">unit price, subtotal, total</text>

  <path d="M302 238 H420" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M730 238 H836" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M302 528 H420" stroke="#059669" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <path d="M730 528 H836" stroke="#059669" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <path d="M580 326 V416" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M970 314 V416" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="430" y="662" width="666" height="34" rx="17" fill="#E2E8F0"/>
  <text x="462" y="685" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Invariant:</text>
  <text x="544" y="685" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15">the database stores trusted price, original request, and normalized base quantity.</text>
</svg>

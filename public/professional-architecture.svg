<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="56" y="56" width="1168" height="608" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="88" y="108" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">AasaMedChem Software Architecture</text>
  <text x="90" y="142" fill="#475569" font-family="Arial, sans-serif" font-size="16">Next.js App Router + NextAuth + Drizzle ORM + Neon PostgreSQL + Vercel</text>

  <rect x="86" y="210" width="210" height="120" rx="14" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="132" y="258" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">Admin</text>
  <text x="116" y="288" fill="#475569" font-family="Arial, sans-serif" font-size="15">Products, inventory,</text>
  <text x="128" y="310" fill="#475569" font-family="Arial, sans-serif" font-size="15">orders review</text>

  <rect x="86" y="390" width="210" height="120" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="126" y="438" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">Seller/User</text>
  <text x="120" y="468" fill="#475569" font-family="Arial, sans-serif" font-size="15">Catalog, quotation,</text>
  <text x="142" y="490" fill="#475569" font-family="Arial, sans-serif" font-size="15">orders</text>

  <rect x="420" y="190" width="320" height="340" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="474" y="232" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Next.js App Router</text>
  <rect x="454" y="266" width="252" height="54" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="488" y="300" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">Role Guard Proxy</text>
  <rect x="454" y="338" width="252" height="54" rx="10" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="504" y="372" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">NextAuth JWT</text>
  <rect x="454" y="410" width="252" height="54" rx="10" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="500" y="444" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">API Route Handlers</text>
  <rect x="454" y="482" width="252" height="54" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="482" y="516" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">Unit + Decimal Math</text>

  <rect x="870" y="205" width="260" height="130" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="918" y="260" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Neon PostgreSQL</text>
  <text x="918" y="292" fill="#475569" font-family="Arial, sans-serif" font-size="15">Users, products, units,</text>
  <text x="928" y="314" fill="#475569" font-family="Arial, sans-serif" font-size="15">quotations, orders</text>

  <rect x="870" y="410" width="260" height="110" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="930" y="460" fill="#0f172a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Vercel</text>
  <text x="916" y="492" fill="#475569" font-family="Arial, sans-serif" font-size="15">Hosting and deployment</text>

  <path d="M296 270 H420" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M296 450 H420" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M740 430 C820 430 810 270 870 270" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M870 464 H740" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="185" y="575" width="890" height="58" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="222" y="611" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Canonical storage:</text>
  <text x="410" y="611" fill="#475569" font-family="Arial, sans-serif" font-size="18">kg -> g, L -> mL, count -> unit, totals recalculated server-side</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
